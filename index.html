<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Gaming FF - Premium Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-red: #ff0000;
            --yt-red: #FF0000;
            --tg-blue: #0088cc;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Fullscreen Background Video Wrapper */
        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .video-container iframe {
            width: 100vw;
            height: 56.25vw;
            min-height: 100vh;
            min-width: 177.77vh;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            filter: brightness(0.4) contrast(1.1);
            pointer-events: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 35px;
            letter-spacing: 5px;
            color: white;
            text-transform: uppercase;
            text-shadow: 0 0 15px var(--primary-red);
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 600px;
        }

        .premium-btn {
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 18px 30px;
            border-radius: 12px;
            transition: all 0.3s ease;
            color: white;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .yt-btn:hover { border-color: var(--yt-red); box-shadow: 0 0 20px rgba(255,0,0,0.5); transform: translateY(-5px); }
        .tg-main:hover { border-color: var(--tg-blue); box-shadow: 0 0 20px rgba(0,136,204,0.5); transform: translateY(-5px); }
        .tg-private:hover { border-color: #ffd700; box-shadow: 0 0 20px rgba(255, 215, 0, 0.3); transform: translateY(-5px); }
        .tg-second:hover { border-color: #00ff88; box-shadow: 0 0 20px rgba(0, 255, 136, 0.3); transform: translateY(-5px); }

        .premium-btn:active { transform: scale(0.95); }

        @media (max-width: 600px) {
            .links-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="video-container">
        <iframe src="https://www.youtube.com/embed/00CUIoYH__8?autoplay=1&mute=1&loop=1&playlist=00CUIoYH__8&controls=0&modestbranding=1&rel=0" frameborder="0" allow="autoplay; encrypted-media"></iframe>
        <div class="overlay"></div>
    </div>

    <div class="content">
        <h1>APPLE GAMING FF</h1>
        
        <div class="links-grid">
            <a href="https://youtube.com/@a1nx_gaming-b3i?si=IPpIH5kjYlgNOyjY" class="premium-btn yt-btn" target="_blank">
                <i class="fab fa-youtube"></i>
                <span>YouTube</span>
            </a>

            <a href="https://t.me/applegaming_ff" class="premium-btn tg-main" target="_blank">
                <i class="fab fa-telegram-plane"></i>
                <span>Main Channel</span>
            </a>

            <a href="https://t.me/+KeEY2ASQ4Z9mYjc9" class="premium-btn tg-private" target="_blank">
                <i class="fas fa-user-shield"></i>
                <span>Private Group</span>
            </a>

            <a href="https://t.me/applegaming20" class="premium-btn tg-second" target="_blank">
                <i class="fas fa-paper-plane"></i>
                <span>2nd Channel</span>
            </a>
        </div>
    </div>

</body>
</html>
