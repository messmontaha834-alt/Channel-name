<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>APPLE GAMING FF · ULTRA PRO MAX</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-red: #ff1a1a;
            --neon-glow: 0 0 15px #ff0000, 0 0 40px #aa0000;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: black;
            color: white;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* ===== DYNAMIC BACKGROUND ===== */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('itachi.png') center/cover no-repeat;
            filter: brightness(0.45) saturate(1.2);
            transform: scale(1.02);
            z-index: -2;
            animation: slowZoom 18s infinite alternate ease-in-out;
        }

        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.07); }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 30% 40%, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 90%),
                repeating-linear-gradient(45deg, rgba(255,0,0,0.02) 0px, rgba(255,0,0,0.02) 20px, rgba(0,0,0,0.3) 20px, rgba(0,0,0,0.3) 40px);
            z-index: -1;
            pointer-events: none;
        }

        .overlay::after {
            content: '';
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 70% 30%, rgba(255, 60, 60, 0.1) 0%, transparent 50%);
            animation: moveLight 12s infinite alternate;
        }

        @keyframes moveLight {
            0% { transform: translate(0, 0); opacity: 0.3; }
            100% { transform: translate(-3%, -2%); opacity: 0.7; }
        }

        /* ===== MAIN CONTENT ===== */
        .content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px 16px 40px;
            backdrop-filter: blur(2px);
        }

        h1 {
            font-size: clamp(2.6rem, 12vw, 5.2rem);
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff8f8, #ffc8c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 8px #ff0000, 0 0 20px #ff4d4d, 0 0 45px #a10000;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 15px crimson);
            animation: textFlicker 3s infinite;
        }

        @keyframes textFlicker {
            0% { opacity: 1; text-shadow: 0 0 8px red, 0 0 25px #f00; }
            92% { opacity: 1; }
            94% { opacity: 0.92; text-shadow: 0 0 15px red, 0 0 50px #ff5e5e; }
            96% { opacity: 1; text-shadow: 0 0 5px darkred; }
            98% { opacity: 0.95; text-shadow: 0 0 25px #ff3232; }
            100% { opacity: 1; text-shadow: 0 0 8px red, 0 0 25px #f00; }
        }

        .sub-invite {
            font-size: 1.2rem;
            margin-bottom: 20px;
            background: rgba(10, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            padding: 10px 28px;
            border-radius: 60px;
            border: 1px solid rgba(255, 60, 60, 0.5);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
            font-weight: 400;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            color: #ffe7e7;
        }

        .sub-invite i {
            color: #ff3b3b;
            font-size: 1.6rem;
            filter: drop-shadow(0 0 8px red);
        }

        /* Music info bar - shows song name */
        .music-info-bar {
            background: rgba(20, 0, 0, 0.7);
            backdrop-filter: blur(16px);
            padding: 12px 25px;
            border-radius: 60px;
            border: 1px solid #ff5e5e;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 25px;
            max-width: 90%;
        }

        .song-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1rem;
            color: #fff0f0;
        }

        .song-info i {
            color: #ff4d4d;
            font-size: 1.6rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); text-shadow: 0 0 20px red; }
            100% { opacity: 1; transform: scale(1); }
        }

        .song-name {
            font-weight: 600;
            letter-spacing: 0.5px;
            background: linear-gradient(45deg, #fff, #ffb3b3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Music control button - ON/OFF */
        .music-control-btn {
            background: rgba(255, 40, 40, 0.25);
            border: 2px solid #ff4d4d;
            color: white;
            padding: 10px 24px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
            backdrop-filter: blur(8px);
        }

        .music-control-btn:hover {
            background: rgba(255, 0, 0, 0.5);
            transform: scale(1.02);
            box-shadow: 0 0 30px red;
        }

        .music-control-btn i {
            font-size: 1.8rem;
            filter: drop-shadow(0 0 8px red);
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(150px, 280px));
            gap: 22px;
            max-width: 650px;
            width: 100%;
            margin: 20px 0 30px;
        }

        .btn {
            text-decoration: none;
            color: white;
            background: rgba(15, 15, 20, 0.4);
            backdrop-filter: blur(12px);
            padding: 18px 20px;
            border-radius: 30px;
            border: 1.5px solid rgba(255, 30, 30, 0.4);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.7), 0 0 10px rgba(255, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            font-weight: 700;
            font-size: 1.2rem;
            transition: 0.25s ease-in-out;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 50, 50, 0.4), transparent);
            transition: left 0.6s;
            z-index: 0;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn i {
            font-size: 1.8rem;
            filter: drop-shadow(0 0 8px currentColor);
            transition: 0.2s;
            z-index: 2;
        }

        .btn:hover {
            background: rgba(180, 0, 0, 0.5);
            border-color: #ff5e5e;
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 16px 25px -5px black, 0 0 30px #ff0000;
        }

        /* hidden youtube iframe */
        #music-player {
            display: none;
        }

        @media (max-width: 550px) {
            .links-grid {
                grid-template-columns: 1fr;
                gap: 18px;
            }
            .btn {
                padding: 18px 22px;
                font-size: 1.25rem;
                justify-content: flex-start;
            }
            h1 {
                font-size: 3.4rem;
                letter-spacing: 2px;
            }
            .sub-invite {
                font-size: 1rem;
                padding: 8px 18px;
            }
            .music-info-bar {
                flex-direction: column;
                gap: 12px;
                padding: 15px;
            }
        }

        .particle {
            position: fixed;
            top: -10px;
            background: rgba(255, 30, 30, 0.25);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            filter: blur(2px);
            box-shadow: 0 0 20px red;
            animation: fall 10s linear infinite;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes fall {
            to { transform: translateY(100vh) scale(1.8); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="background-container"></div>
    <div class="overlay"></div>

    <!-- PARTICLE CONTAINER -->
    <div id="particle-field"></div>

    <!-- YOUTUBE IFRAME (hidden) -->
    <iframe id="music-player" 
        src="https://www.youtube.com/embed/5NQ-gTgJFjw?autoplay=1&mute=0&loop=1&playlist=5NQ-gTgJFjw&controls=0&showinfo=0&modestbranding=1&enablejsapi=1"
        allow="autoplay; encrypted-media"
        allowfullscreen>
    </iframe>

    <!-- MAIN CONTENT -->
    <div class="content">
        <h1>APPLE GAMING FF</h1>
        
        <div class="sub-invite">
            <i class="fas fa-crown"></i> 
            <span>🔥 ULTRA PRO MAX EDITION 🔥</span>
            <i class="fas fa-infinity"></i>
        </div>

        <!-- MUSIC INFO + CONTROL BAR (song name & on/off button) -->
        <div class="music-info-bar">
            <div class="song-info">
                <i class="fas fa-compact-disc"></i>
                <span class="song-name">♪ 5NQ-gTgJFjw · Itachi's Theme ♪</span>
            </div>
            <div id="musicToggleBtn" class="music-control-btn">
                <i class="fas fa-play" id="musicIcon"></i>
                <span id="musicBtnText">MUSIC ON</span>
            </div>
        </div>

        <div class="links-grid">
            <a href="https://youtube.com/@a1nx_gaming-b3i" class="btn" target="_blank" rel="noopener">
                <i class="fab fa-youtube"></i> YouTube
            </a>
            <a href="https://t.me/applegaming_ff" class="btn" target="_blank" rel="noopener">
                <i class="fab fa-telegram-plane"></i> Telegram
            </a>
            <!-- Changed to "Telegram Private Channel" as requested -->
            <a href="https://t.me/+KeEY2ASQ4Z9mYjc9" class="btn" target="_blank" rel="noopener">
                <i class="fas fa-lock"></i> Telegram Private Channel
            </a>
            <!-- Changed to "2nd Telegram Channel" for clarity -->
            <a href="https://t.me/applegaming20" class="btn" target="_blank" rel="noopener">
                <i class="fab fa-telegram-plane"></i> 2nd Telegram Channel
            </a>
        </div>

        <div style="margin-top: 20px; opacity:0.8; font-size:0.9rem; display: flex; gap: 8px; background: rgba(0,0,0,0.3); padding: 6px 18px; border-radius: 40px;">
            <i class="fas fa-volume-up" style="color:#ff4f4f;"></i>
            <span>use the button above to control music</span>
        </div>
    </div>

    <script>
        // ========== YOUTUBE IFrame API ==========
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        var isMusicPlaying = true; // starts playing

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('music-player', {
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            event.target.setVolume(70);
            event.target.playVideo();  // auto-play
            isMusicPlaying = true;
            updateButtonUI();
        }

        function onPlayerStateChange(event) {
            // Update button if video ends (but loop will restart)
            if (event.data == YT.PlayerState.PLAYING) {
                isMusicPlaying = true;
            } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                isMusicPlaying = false;
            }
            updateButtonUI();
        }

        // Toggle music function
        function toggleMusic() {
            if (!player) return;
            if (isMusicPlaying) {
                player.pauseVideo();
            } else {
                player.playVideo();
            }
            // isMusicPlaying will be updated by onPlayerStateChange
        }

        // Update button icon and text
        function updateButtonUI() {
            const icon = document.getElementById('musicIcon');
            const text = document.getElementById('musicBtnText');
            if (isMusicPlaying) {
                icon.className = 'fas fa-pause';
                text.innerText = 'MUSIC ON';
            } else {
                icon.className = 'fas fa-play';
                text.innerText = 'MUSIC OFF';
            }
        }

        // Attach event to toggle button
        document.getElementById('musicToggleBtn').addEventListener('click', function(e) {
            e.stopPropagation();  // prevent any accidental body click interference
            toggleMusic();
        });

        // Also ensure that clicking elsewhere does NOT affect music
        document.body.addEventListener('click', function(e) {
            // If the click is not on the toggle button, do nothing to music
            // (but we don't want to stop music accidentally)
            // So we just ignore.
        });

        // ========== FALLING PARTICLES ==========
        function createParticles() {
            for (let i = 0; i < 18; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 6 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 7 + 6) + 's';
                particle.style.animationDelay = (Math.random() * 5) + 's';
                particle.style.background = `rgba(255, ${Math.floor(20 + Math.random()*30)}, 30, ${0.2 + Math.random()*0.3})`;
                particle.style.boxShadow = `0 0 ${Math.floor(10 + Math.random()*20)}px #ff0000`;
                document.body.appendChild(particle);
            }
        }
        window.addEventListener('load', createParticles);
    </script>
</body>
</html>
