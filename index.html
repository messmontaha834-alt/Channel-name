<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Gaming FF</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background-color: #000;
            color: white;
            overflow: hidden;
        }

        /* Background Image Setting */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('itachi.png'); /* Ensure itachi.png is in the same folder */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: brightness(0.5);
            z-index: -1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 20px #ff0000;
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 500px;
        }

        .btn {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }

        .btn:hover {
            background: rgba(255, 0, 0, 0.3);
            border-color: #ff0000;
            transform: translateY(-5px);
        }

        /* Hidden Audio Player (YouTube) */
        #video-bg {
            display: none;
        }

        @media (max-width: 600px) {
            .links-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <div class="background-container"></div>
    <div class="overlay"></div>

    <iframe id="video-bg" 
        src="https://www.youtube.com/embed/5NQ-gTgJFjw?autoplay=1&mute=0&loop=1&playlist=5NQ-gTgJFjw" 
        allow="autoplay">
    </iframe>

    <div class="content">
        <h1>APPLE GAMING FF</h1>
        
        <div class="links-grid">
            <a href="https://youtube.com/@a1nx_gaming-b3i" class="btn" target="_blank">
                <i class="fab fa-youtube"></i> YouTube
            </a>
            <a href="https://t.me/applegaming_ff" class="btn" target="_blank">
                <i class="fab fa-telegram-plane"></i> Telegram
            </a>
            <a href="https://t.me/+KeEY2ASQ4Z9mYjc9" class="btn" target="_blank">
                <i class="fas fa-user-shield"></i> Private
            </a>
            <a href="https://t.me/applegaming20" class="btn" target="_blank">
                <i class="fas fa-paper-plane"></i> 2nd Channel
            </a>
        </div>
    </div>

    <script>
        window.addEventListener('click', () => {
            const iframe = document.getElementById('video-bg');
            // This ensures sound plays if browser blocked it initially
            iframe.src = iframe.src.replace("mute=1", "mute=0");
        }, { once: true });
    </script>

</body>
</html>
