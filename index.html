<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>APPLE GAMING FF · ULTRA PRO MAX</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-red: #ff1a1a;
            --neon-glow: 0 0 15px #ff0000, 0 0 40px #aa0000;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: black;
            color: white;
            overflow-x: hidden;
            overflow-y: auto;
        }

        /* ===== DYNAMIC BACKGROUND ===== */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('itachi.png') center/cover no-repeat;
            filter: brightness(0.45) saturate(1.2);
            transform: scale(1.02);
            z-index: -2;
            animation: slowZoom 18s infinite alternate ease-in-out;
        }

        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.07); }
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 30% 40%, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 90%),
                repeating-linear-gradient(45deg, rgba(255,0,0,0.02) 0px, rgba(255,0,0,0.02) 20px, rgba(0,0,0,0.3) 20px, rgba(0,0,0,0.3) 40px);
            z-index: -1;
            pointer-events: none;
        }

        .overlay::after {
            content: '';
            position: absolute;
            top: -20%;
            left: -20%;
            width: 140%;
            height: 140%;
            background: radial-gradient(circle at 70% 30%, rgba(255, 60, 60, 0.1) 0%, transparent 50%);
            animation: moveLight 12s infinite alternate;
        }

        @keyframes moveLight {
            0% { transform: translate(0, 0); opacity: 0.3; }
            100% { transform: translate(-3%, -2%); opacity: 0.7; }
        }

        /* ===== MAIN CONTENT ===== */
        .content {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px 16px 40px;
            backdrop-filter: blur(2px);
        }

        h1 {
            font-size: clamp(2.6rem, 12vw, 5.2rem);
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff8f8, #ffc8c8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 8px #ff0000, 0 0 20px #ff4d4d, 0 0 45px #a10000;
            margin-bottom: 12px;
            filter: drop-shadow(0 0 15px crimson);
            animation: textFlicker 3s infinite;
        }

        @keyframes textFlicker {
            0% { opacity: 1; text-shadow: 0 0 8px red, 0 0 25px #f00; }
            92% { opacity: 1; }
            94% { opacity: 0.92; text-shadow: 0 0 15px red, 0 0 50px #ff5e5e; }
            96% { opacity: 1; text-shadow: 0 0 5px darkred; }
            98% { opacity: 0.95; text-shadow: 0 0 25px #ff3232; }
            100% { opacity: 1; text-shadow: 0 0 8px red, 0 0 25px #f00; }
        }

        .sub-invite {
            font-size: 1.3rem;
            margin-bottom: 25px;
            background: rgba(10, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            padding: 10px 28px;
            border-radius: 60px;
            border: 1px solid rgba(255, 60, 60, 0.5);
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.3);
            font-weight: 400;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            color: #ffe7e7;
        }

        .sub-invite i {
            color: #ff3b3b;
            font-size: 1.6rem;
            filter: drop-shadow(0 0 8px red);
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(150px, 280px));
            gap: 22px;
            max-width: 650px;
            width: 100%;
            margin: 20px 0 30px;
        }

        .btn {
            text-decoration: none;
            color: white;
            background: rgba(15, 15, 20, 0.4);
            backdrop-filter: blur(12px);
            padding: 18px 20px;
            border-radius: 30px;
            border: 1.5px solid rgba(255, 30, 30, 0.4);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.7), 0 0 10px rgba(255, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            font-weight: 700;
            font-size: 1.2rem;
            transition: 0.25s ease-in-out;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 50, 50, 0.4), transparent);
            transition: left 0.6s;
            z-index: 0;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn i {
            font-size: 1.8rem;
            filter: drop-shadow(0 0 8px currentColor);
            transition: 0.2s;
            z-index: 2;
        }

        .btn:hover {
            background: rgba(180, 0, 0, 0.5);
            border-color: #ff5e5e;
            transform: translateY(-6px) scale(1.02);
            box-shadow: 0 16px 25px -5px black, 0 0 30px #ff0000;
        }

        .btn:active {
            transform: translateY(2px) scale(0.98);
            box-shadow: 0 0 40px red;
        }

        /* ===== MUSIC WIDGET (now purely visual + auto-play) ===== */
        .music-note {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            padding: 14px 18px;
            border-radius: 60px;
            border: 1px solid #ff3a3a;
            color: white;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.1rem;
            font-weight: 500;
            z-index: 999;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4);
            pointer-events: none;  /* so clicks pass through, preventing accidental stop */
            border-left: 4px solid red;
        }

        .music-note i {
            font-size: 2rem;
            color: #ff3b3b;
            filter: drop-shadow(0 0 10px red);
            animation: spinBeat 2.4s infinite;
        }

        @keyframes spinBeat {
            0% { transform: rotate(0deg) scale(1); }
            30% { transform: rotate(8deg) scale(1.15); }
            60% { transform: rotate(-6deg) scale(1.05); }
            100% { transform: rotate(0deg) scale(1); }
        }

        /* hidden youtube iframe */
        #music-player {
            display: none;
        }

        @media (max-width: 550px) {
            .links-grid {
                grid-template-columns: 1fr;
                gap: 18px;
            }
            .btn {
                padding: 18px 22px;
                font-size: 1.25rem;
                justify-content: flex-start;
            }
            h1 {
                font-size: 3.4rem;
                letter-spacing: 2px;
            }
            .sub-invite {
                font-size: 1rem;
                padding: 8px 18px;
            }
        }

        .particle {
            position: fixed;
            top: -10px;
            background: rgba(255, 30, 30, 0.25);
            width: 4px;
            height: 4px;
            border-radius: 50%;
            filter: blur(2px);
            box-shadow: 0 0 20px red;
            animation: fall 10s linear infinite;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes fall {
            to { transform: translateY(100vh) scale(1.8); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="background-container"></div>
    <div class="overlay"></div>

    <!-- PARTICLE CONTAINER (js will fill) -->
    <div id="particle-field"></div>

    <!-- 
        ULTIMATE AUTO-PLAY MUSIC SOLUTION:
        - Added &mute=0 (explicitly unmuted)
        - Added allow="autoplay" 
        - Uses YouTube iframe API approach with autoplay=1
        - For maximum compatibility, we also attach a hidden click simulation?
        But the most robust: embed with &autoplay=1 and mute=0. 
        Modern browsers allow autoplay if iframe is loaded with user interaction on the page? 
        We'll also preload with a dummy button-less approach.
    -->
    <iframe id="music-player" 
        src="https://www.youtube.com/embed/5NQ-gTgJFjw?autoplay=1&mute=0&loop=1&playlist=5NQ-gTgJFjw&controls=0&showinfo=0&modestbranding=1&enablejsapi=1"
        allow="autoplay; encrypted-media"
        allowfullscreen>
    </iframe>

    <!-- MAIN CONTENT (no click music trigger) -->
    <div class="content">
        <h1>APPLE GAMING FF</h1>
        
        <div class="sub-invite">
            <i class="fas fa-play"></i> 
            <span>🔥 স্বয়ংক্রিয় মিউজিক · AUTO PLAY 🔥</span>
            <i class="fas fa-infinity"></i>
        </div>

        <div class="links-grid">
            <a href="https://youtube.com/@a1nx_gaming-b3i" class="btn" target="_blank" rel="noopener">
                <i class="fab fa-youtube"></i> YouTube
            </a>
            <a href="https://t.me/applegaming_ff" class="btn" target="_blank" rel="noopener">
                <i class="fab fa-telegram-plane"></i> Telegram
            </a>
            <a href="https://t.me/+KeEY2ASQ4Z9mYjc9" class="btn" target="_blank" rel="noopener">
                <i class="fas fa-user-shield"></i> Private Group
            </a>
            <a href="https://t.me/applegaming20" class="btn" target="_blank" rel="noopener">
                <i class="fas fa-paper-plane"></i> 2nd Channel
            </a>
        </div>

        <div style="margin-top: 25px; opacity:0.7; font-size:0.9rem; display: flex; gap: 8px; background: rgba(0,0,0,0.3); padding: 6px 18px; border-radius: 40px; backdrop-filter: blur(3px);">
            <i class="fas fa-volume-up" style="color:#ff4f4f;"></i>
            <span>গান চলছে · Music auto‑play enabled</span>
        </div>
    </div>

    <!-- floating music indicator (purely visual, no click) -->
    <div class="music-note">
        <i class="fas fa-music"></i>
        <span>AUTO MUSIC</span>
        <i class="fas fa-check-circle" style="color:#00ff88;"></i>
    </div>

    <script>
        // ========== ULTRA PRO MAX AUTO MUSIC ==========
        // Goal: Music starts automatically on page load, no click needed.
        // Force YouTube iframe to reload with autoplay parameters after page load
        // Also we try to call playVideo() via YouTube API if possible.
        
        // 1. First technique: replace src after a tiny delay to ensure dom ready (but keep autoplay)
        window.addEventListener('load', function() {
            const player = document.getElementById('music-player');
            // Ensure the src has autoplay=1 and mute=0 (already set, but we re-affirm)
            let currentSrc = player.src;
            // Remove any mute=1 if present, set mute=0 explicitly
            if (currentSrc.includes('mute=1')) {
                currentSrc = currentSrc.replace('mute=1', 'mute=0');
            } else if (!currentSrc.includes('mute=0')) {
                // add mute=0 if missing
                currentSrc += '&mute=0';
            }
            // Ensure autoplay=1
            if (!currentSrc.includes('autoplay=1')) {
                currentSrc = currentSrc.replace('autoplay=0', 'autoplay=1'); // just in case
                if (!currentSrc.includes('autoplay=1')) currentSrc += '&autoplay=1';
            }
            player.src = currentSrc;

            // 2. Additionally, try to use YouTube iframe API to command play
            // We'll inject a small script that communicates with the iframe
            // For simplicity, we can also trigger a dummy click on document, but user said no click needed.
            // The reload of src itself will trigger autoplay because allow=autoplay is set.
            console.log('🎵 Auto music engaged · 播放音乐');
        });

        // Also try to play immediately after iframe loads (redundant but safe)
        // For browsers that block autoplay, we can add a "silent" background interaction?
        // But we trust the combination of allow=autoplay and &autoplay=1
        // Another trick: pre-connect to youtube domain for faster load.
        
        // Create falling particles (visual only)
        function createParticles() {
            for (let i = 0; i < 18; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                const size = Math.random() * 6 + 2;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 7 + 6) + 's';
                particle.style.animationDelay = (Math.random() * 5) + 's';
                particle.style.background = `rgba(255, ${Math.floor(20 + Math.random()*30)}, 30, ${0.2 + Math.random()*0.3})`;
                particle.style.boxShadow = `0 0 ${Math.floor(10 + Math.random()*20)}px #ff0000`;
                document.body.appendChild(particle);
            }
        }
        window.addEventListener('load', createParticles);

        // Optional: In very strict browsers, a user interaction is still required.
        // We can simulate a click on body after 0.3s? But that may conflict with "no click".
        // However, since the requirement is "ঢোকার সাথে সাথে গান বাজা শুরু করে" (start music as soon as you enter),
        // we want zero click. So we'll also try to programmatically play via iframe's contentWindow.postMessage
        // but that's unreliable cross-origin. Better: use YouTube's JS API.
        // Let's implement proper YouTube IFrame API for ultimate control.

        // This method uses YouTube Player API to ensure playback
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('music-player', {
                events: {
                    'onReady': onPlayerReady,
                    'onStateChange': onPlayerStateChange
                }
            });
        }

        function onPlayerReady(event) {
            // Player is ready, try to play and set volume
            event.target.setVolume(70); // comfortable level
            event.target.playVideo();    // explicitly start
            console.log('YT Player ready · playing');
        }

        function onPlayerStateChange(event) {
            // loop handling is already done via playlist parameter
            if (event.data == YT.PlayerState.ENDED) {
                // replay if needed, but playlist param handles loop
            }
        }

        // fallback: if API fails, we already have iframe src reload method.
        // Also, ensure that any accidental click on body doesn't stop music
        // (the music-note has pointer-events: none so clicks pass through to body)
        // But body clicks might still interact with iframe? They won't stop it.
        // We also remove any onclick from content area that could restart/stop music.
    </script>
</body>
</html>
